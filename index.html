<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>سمارت سێرڤ | Smartserve</title>
    <link rel="manifest" href="manifest.json?v=83">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/ali-new-logo.jpg">
    <meta name="application-name" content="Smartserve">
    <meta name="msapplication-TileColor" content="#5C4033">
    <meta name="msapplication-TileImage" content="assets/icon-512.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Smartserve">
    <meta name="theme-color" content="#8B6914">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=61">
</head>
<body class="index-page has-video-bg">

    <div class="logo-splash" id="logoSplash">
        <img src="assets/ali-logo-page.jpg?v=83" alt="Smartserve" onerror="this.onerror=null; this.src='assets/logo.svg';">
        <span class="logo-splash-text">Smartserve</span>
        <div class="logo-splash-dots"><span></span><span></span><span></span></div>
    </div>

    <video class="bg-video" autoplay muted loop playsinline>
        <source src="images/menu-bg.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <section class="hero">
        <div class="hero-center">
            <div class="logo-float-wrap">
                <img src="assets/ali-logo-page.jpg?v=83" alt="Smartserve" class="logo" id="indexLogo"
                     onerror="this.onerror=null; this.src='assets/logo.svg';">
            </div>
            <h1 class="cafe-name">Smart <span class="gold">serve</span></h1>

            <div class="coffee-wrap">
                <svg class="coffee-cup" viewBox="0 0 64 68" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M10 18 h44 v34 c0 8-5.4 14-16 14 s-16-6-16-14 z" fill="#6b3a1a"/>
                    <ellipse cx="32" cy="18" rx="22" ry="6" fill="#4a2a12"/>
                    <ellipse cx="32" cy="18" rx="15" ry="4" fill="#8b5e3c"/>
                    <path d="M54 26 q8 0 8 10 q0 10-8 10" fill="none" stroke="#6b3a1a" stroke-width="4" stroke-linecap="round"/>
                    <path class="steam steam1" d="M22 10 q2-4 0-8" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
                    <path class="steam steam2" d="M32 8 q2-5 0-10" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
                    <path class="steam steam3" d="M42 10 q2-4 0-8" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>

            <p class="cafe-tagline">Premium Coffee House in Baherka</p>

            <div class="lang-group">
                <button class="lang-btn" data-lang="ku" onclick="openMenu('ku')">
                    <span class="lang-flag"><img src="images/flag-kurdistan.svg" alt="" class="lang-flag-img" width="22" height="15"></span>
                    <span>کوردی</span>
                </button>
                <span class="lang-sep">|</span>
                <button class="lang-btn" data-lang="ar" onclick="openMenu('ar')">
                    <span class="lang-flag">🇮🇶</span>
                    <span>العربية</span>
                </button>
                <span class="lang-sep">|</span>
                <button class="lang-btn" data-lang="en" onclick="openMenu('en')">
                    <span class="lang-flag">🇬🇧</span>
                    <span>English</span>
                </button>
            </div>
        </div>
    </section>

    <script src="js/app.js?v=74"></script>
    <script>
        (function () {
            var splash = document.getElementById('logoSplash');
            function hideSplash() {
                if (!splash) return;
                splash.classList.add('hidden');
                setTimeout(function () { splash.style.display = 'none'; }, 500);
            }
            window.addEventListener('load', function () {
                setTimeout(hideSplash, 1200);
            });
            setTimeout(hideSplash, 3500);

            var logo = document.getElementById('indexLogo');
            setupLogoClickActions(logo, function () {
                replayLogoSplash(splash);
            });
        })();
    </script>
</body>
</html>
