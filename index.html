<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عەلي کافێ | Ali Coffee</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/ali-cafe-app-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/AppIcons/app-icon-180x180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="images/AppIcons/app-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="images/AppIcons/app-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="images/AppIcons/app-icon-120x120.png">
    <link rel="apple-touch-icon" href="images/AppIcons/app-icon-1024x1024.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ali Coffee">
    <meta name="theme-color" content="#D4AF37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-video-bg">
    <!-- Logo Splash Screen -->
    <div class="logo-splash" id="logoSplash">
        <img src="images/ali-cafe-logo-circular.png" alt="Ali Coffee" onerror="this.onerror=null; this.innerHTML='<span style=\'display:flex;align-items:center;justify-content:center;width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#D4AF37,#C8A02A);color:#000;font-weight:800;font-size:2rem;\'>AC</span>';">
        <span class="logo-splash-text">Ali Coffee</span>
        <div class="logo-splash-dots"><span></span><span></span><span></span></div>
    </div>

    <!-- Background Video -->
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="images/menu-bg.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <main class="hero">
        <div class="hero-center">
            <img src="images/ali-cafe-logo-circular.png" class="logo" alt="Ali Coffee Logo" onerror="this.onerror=null; this.src='assets/logo.svg';">

            <h1 class="cafe-name">Ali <span class="gold">Coffee</span></h1>

            <div class="coffee-wrap">
                <svg class="coffee-cup" viewBox="0 0 64 68" xmlns="http://www.w3.org/2000/svg" aria-label="coffee cup">
                    <path d="M10 18 h44 v34 c0 8-5.4 14-16 14 s-16-6-16-14 z" fill="#6b3a1a"/>
                    <ellipse cx="32" cy="18" rx="22" ry="6" fill="#4a2a12"/>
                    <ellipse cx="32" cy="18" rx="15" ry="4" fill="#8b5e3c"/>
                    <path d="M54 26 q8 0 8 10 q0 10-8 10" fill="none" stroke="#6b3a1a" stroke-width="4" stroke-linecap="round"/>
                    <path class="steam steam1" d="M22 10 q2-4 0-8" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
                    <path class="steam steam2" d="M32 8 q2-5 0-10" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
                    <path class="steam steam3" d="M42 10 q2-4 0-8" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>

            <p class="cafe-tagline">Premium Coffee House in Baherka</p>


            <div class="lang-group">
                <button class="lang-btn" data-lang="ku" onclick="openMenu('ku')">کوردی</button>
                <span class="lang-sep">·</span>
                <button class="lang-btn" data-lang="ar" onclick="openMenu('ar')">اللعربیة</button>
                <span class="lang-sep">·</span>
                <button class="lang-btn" data-lang="en" onclick="openMenu('en')">English</button>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        (function() {
            var splash = document.getElementById('logoSplash');
            if (!splash) return;
            function hideSplash() {
                splash.classList.add('hidden');
                setTimeout(function() { splash.style.display = 'none'; }, 500);
            }
            window.addEventListener('load', function() { setTimeout(hideSplash, 800); });
            setTimeout(hideSplash, 3000);
        })();

        function fallbackLogo(img) {
            img.onerror = null;
            img.style.display = 'none';
            if (!img.dataset.fallback) {
                img.dataset.fallback = 'true';
                var wrap = img.parentElement;
                if (wrap) {
                    var span = document.createElement('span');
                    span.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(135deg,#D4AF37,#C8A02A);color:#000;font-weight:800;font-family:var(--font-display);flex-shrink:0;border:3px solid rgba(212,175,55,0.2);box-shadow:0 8px 48px rgba(212,175,55,0.3);animation:logoFloat 4s ease-in-out infinite;';
                    span.style.width = img.style.height || '130px';
                    span.style.height = img.style.height || '130px';
                    span.style.fontSize = '2.5rem';
                    span.textContent = 'AC';
                    wrap.insertBefore(span, wrap.firstChild);
                }
            }
        }
    </script>
</body>
</html>
