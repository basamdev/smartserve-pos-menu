        .log .err { color: #C62828; }
        .log .info { color: #D4AF37; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #161616; border: 1px solid rgba(212,175,55,0.15); border-radius: 10px; padding: 16px; text-align: center; }
        .stat-box .num { font-size: 1.8rem; font-weight: 700; color: #D4AF37; }

        document.getElementById('totalCats').textContent = cats.length;

        function log(msg, type) {
            const lb = document.getElementById('logBox');
            lb.style.display = 'block';
            const cls = type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'info';
            lb.innerHTML += '<div class="' + cls + '">' + msg + '</div>';
            lb.scrollTop = lb.scrollHeight;
        }

        async function seedMenu() {
            const btn = document.getElementById('seedBtn');
            const status = document.getElementById('statusBox');
            btn.disabled = true;
            btn.textContent = '⏳ Uploading...';
            status.className = 'status info';
            status.textContent = 'Uploading menu items to Firebase...';
            document.getElementById('logBox').innerHTML = '';
            document.getElementById('logBox').style.display = 'block';

            let added = 0;
            let errors = 0;

            for (let i = 0; i < menuItems.length; i++) {
                const item = menuItems[i];
                try {
                    await db.collection('menuItems').add(item);
                    added++;
                    log('✅ [' + item.category + '] ' + item.name_en + ' — ' + item.price + ' IQD', 'ok');
                } catch (err) {
                    errors++;
                    log('❌ ' + item.name_en + ': ' + err.message, 'err');
                }
                document.getElementById('addedCount').textContent = added;
            }

            if (errors === 0) {
                status.className = 'status success';
                status.textContent = '✅ Successfully added ' + added + ' menu items to Firebase!';
                btn.textContent = '✅ Done!';
                log('', 'info');
                log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
                log('🎉 All ' + added + ' items uploaded successfully!', 'ok');
                log('📂 Categories: ' + cats.join(', '), 'info');
            } else {
                status.className = 'status error';
                status.textContent = '⚠️ Added ' + added + ' items, ' + errors + ' errors.';
                btn.textContent = '⚠️ Completed with errors';
            }
        }
