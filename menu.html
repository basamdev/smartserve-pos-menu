<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Coffee | Menu</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="512x512" href="images/ali-cafe-logo-circular.png">
    <link rel="apple-touch-icon" href="images/ali-cafe-logo-circular.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ali Coffee">
    <meta name="theme-color" content="#D4AF37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGwcBEjwaCcVggOwTt8bMR8t/vQE8zt8VM+g6EZ2r7O9OI6SjFh5VjaALaJfTS5Rjz+id4Q==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-video-bg">
    <!-- Background Video -->
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="images/menu-bg.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <!-- Navigation -->
    <nav class="nav" id="mainNav">
        <div class="nav-inner">
            <a href="index.html" class="logo" aria-label="Ali Coffee Home">
                <img src="images/ali-cafe-logo-circular.png" alt="Ali Coffee" onerror="this.onerror=null; this.src='assets/logo.svg';">
            </a>

            <div class="nav-actions">
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="ku">KU</button>
                    <button class="lang-btn" data-lang="ar">AR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <span class="icon-moon">🌙</span>
                    <span class="icon-sun">☀️</span>
                </button>
                <a href="admin.html" class="btn-nav-admin" data-i18n="admin">Admin</a>
            </div>
        </div>
    </nav>

    <!-- Menu Header + Categories sticky wrapper -->
    <div class="menu-sticky-wrapper">
    <!-- Menu Header -->
    <div class="menu-header">
        <div class="menu-header-center">
            <h1 class="menu-title" data-i18n="menuTitle">Our Menu</h1>
        </div>
    </div>

    <!-- Category Bar -->
    <div class="category-bar" id="categoryBar">
        <div class="category-scroll" id="categoryScroll">
        </div>
    </div>
    </div>

    <!-- Menu Grid -->
    <main class="menu-layout">
        <div class="menu-grid" id="menuGrid">
            <div class="loading-menu" data-i18n="loadingMenu">Loading menu...</div>
        </div>
    </main>

    <!-- Product Detail Modal -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-backdrop" id="detailBackdrop"></div>
        <div class="detail-panel" id="detailPanel">
            <button class="detail-close" id="detailClose" aria-label="Close">✕</button>
            <div class="detail-media" id="detailMedia">
                <img id="detailImage" src="" alt="">
                <button class="video-play-btn" id="videoPlayBtn" aria-label="Play video">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
            </div>
            <div class="detail-content">
                <span class="detail-category" id="detailCategory"></span>
                <h2 class="detail-title" id="detailTitle"></h2>
                <p class="detail-desc" id="detailDesc"></p>
                <div class="detail-footer">
                    <div>
                        <span class="detail-price" id="detailPrice"></span>
                        <span class="detail-price-currency">IQD</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Video Modal -->
    <div class="video-overlay" id="videoOverlay">
        <div class="video-container" id="videoContainer">
            <button class="video-close" id="videoClose" aria-label="Close video">✕</button>
            <video id="detailVideo" controls></video>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
    <script>
        function fallbackLogo(img) {
            img.onerror = null;
            img.style.display = 'none';
            if (!img.dataset.fallback) {
                img.dataset.fallback = 'true';
                var wrap = img.closest('.logo') || img.parentElement;
                if (wrap) {
                    var span = document.createElement('span');
                    var h = img.getAttribute('height') || '40';
                    span.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(135deg,#D4AF37,#C8A02A);color:#000;font-weight:800;font-size:1rem;font-family:var(--font-body);flex-shrink:0;border:2px solid rgba(212,175,55,0.25);box-shadow:0 2px 10px rgba(212,175,55,0.15);';
                    span.style.width = h + 'px';
                    span.style.height = h + 'px';
                    span.textContent = 'AC';
                    wrap.insertBefore(span, wrap.firstChild);
                }
            }
        }
    </script>
</body>
</html>
