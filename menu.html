<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ali Coffee | Menu</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <meta name="application-name" content="Ali Coffee">
    <meta name="msapplication-TileColor" content="#5C4033">
    <meta name="msapplication-TileImage" content="assets/icon-512.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ali Coffee">
    <meta name="theme-color" content="#9B6135">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=60">
</head>
<body class="menu-page emenu-layout light-mode" data-menu-theme="light">
<script>
(function () {
    function emenuBrownRing(hex, alpha) {
        alpha = alpha == null ? 0.22 : alpha;
        if (!hex || hex.charAt(0) !== '#') return 'rgba(155,97,53,' + alpha + ')';
        var h = hex.slice(1);
        if (h.length === 3) h = h.split('').map(function (c) { return c + c; }).join('');
        var r = parseInt(h.slice(0, 2), 16);
        var g = parseInt(h.slice(2, 4), 16);
        var b = parseInt(h.slice(4, 6), 16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    function applyEmenuThemeCssVars(b, t) {
        b.setAttribute('data-menu-theme', t.id || 'light');
        if (t.light) b.classList.add('light-mode'); else b.classList.remove('light-mode');
        b.style.setProperty('--emenu-brown', t.brown);
        b.style.setProperty('--emenu-bg', t.bg);
        b.style.setProperty('--emenu-cat-bg', t.cat);
        b.style.setProperty('--emenu-card-bg', t.card);
        b.style.setProperty('--emenu-surface', t.surface);
        b.style.setProperty('--emenu-pill-bg', t.pill);
        b.style.setProperty('--emenu-fab-bg', t.fab);
        b.style.setProperty('--emenu-text', t.text);
        b.style.setProperty('--emenu-border', t.border);
        b.style.setProperty('--emenu-fab-text', t.fabText);
        b.style.setProperty('--emenu-curve', t.bg);
        b.style.setProperty('--emenu-hero-accent', t.brown);
        b.style.setProperty('--emenu-fab-accent', t.brown);
        b.style.setProperty('--emenu-fab-border', t.border);
        b.style.setProperty('--emenu-fab-accent-ring', emenuBrownRing(t.brown, 0.22));
        b.style.setProperty('--emenu-fab-accent-ring-strong', emenuBrownRing(t.brown, 0.38));
    }

    var themes = {
        light:  { id: 'light',  light: true,  brown: '#9B6135', bg: '#FFFFFF', cat: '#F8F8F8', card: '#FFFFFF', surface: '#FFFFFF', pill: '#FFFFFF', fab: '#FFFFFF', text: '#1A1A1A', border: '#E8E8E8', fabText: '#5F6368' },
        cream:  { id: 'cream',  light: true,  brown: '#8B6914', bg: '#FAF7F2', cat: '#F0E9DF', card: '#FFFFFF', surface: '#FFFFFF', pill: '#FFFFFF', fab: '#FFFFFF', text: '#2C2416', border: '#E8DFD2', fabText: '#6B5E54' },
        coffee: { id: 'coffee', light: true,  brown: '#6F4E37', bg: '#F5EDE3', cat: '#EBE0D4', card: '#FFFCF8', surface: '#FFFCF8', pill: '#FFFCF8', fab: '#FFFFFF', text: '#2A2018', border: '#DDD0C4', fabText: '#6B5344' },
        gold:   { id: 'gold',   light: true,  brown: '#B8910C', bg: '#FFFDF5', cat: '#FBF5E6', card: '#FFFFFF', surface: '#FFFFFF', pill: '#FFFFFF', fab: '#FFFFFF', text: '#1A1608', border: '#EDE4CC', fabText: '#6B6248' },
        mocha:  { id: 'mocha',  light: true,  brown: '#5C4033', bg: '#F3EBE4', cat: '#E8DDD4', card: '#FAF6F2', surface: '#FAF6F2', pill: '#FAF6F2', fab: '#FFFFFF', text: '#261A14', border: '#D9CEC4', fabText: '#6B5A50' },
        dark:   { id: 'dark',   light: false, brown: '#C4956A', bg: '#141414', cat: '#1E1E1E', card: '#2A2A2A', surface: '#2A2A2A', pill: '#2A2A2A', fab: '#333333', text: '#F0F0F0', border: '#444444', fabText: '#CFCFCF' }
    };

    var id = localStorage.getItem('menuTheme') || 'light';
    if (!themes[id]) id = 'light';
    applyEmenuThemeCssVars(document.body, themes[id]);
    window.MENU_THEMES = themes;
    window.applyEmenuThemeCssVars = applyEmenuThemeCssVars;
    window.emenuBrownRing = emenuBrownRing;
})();
</script>

    <header class="menu-hero">
        <video class="menu-hero-video" autoplay muted loop playsinline>
            <source src="images/menu-bg.mp4" type="video/mp4">
        </video>
        <div class="menu-hero-shade"></div>
        <div class="menu-hero-brand" id="menuHeroBrand">
            <div class="menu-hero-logo-wrap">
                <img src="images/ali-cafe-logo-circular.png" alt="Ali Coffee" class="menu-hero-logo" id="menuHeroLogo" onerror="this.onerror=null; this.src='assets/logo.svg';">
                <span class="menu-hero-logo-ring" aria-hidden="true"></span>
            </div>
            <h1 class="menu-hero-title">
                <span class="menu-hero-typewriter" id="heroTypewriter" aria-live="polite">
                    <span class="menu-hero-typed" id="heroTitleTyped" dir="ltr"></span><span class="menu-hero-cursor" id="heroTitleCursor" aria-hidden="true"></span>
                </span>
            </h1>
        </div>
        <div class="menu-hero-curve" aria-hidden="true">
            <svg viewBox="0 0 400 32" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <path class="menu-hero-curve-path" d="M0,32 L0,12 Q200,32 400,12 L400,32 Z"/>
            </svg>
        </div>
    </header>

    <div class="menu-fab-row">
        <div class="lang-dropdown fab-wrap" id="langDropdown">
            <button class="menu-fab" id="langDropdownBtn" aria-label="Select Language">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="m5 8 6 6"/>
                    <path d="m4 14 6-6 2-3"/>
                    <path d="M2 5h12"/>
                    <path d="M7 2h1"/>
                    <path d="m22 22-5-10-5 10"/>
                    <path d="M14 18h6"/>
                </svg>
            </button>
            <div class="lang-dropdown-menu fab-lang-menu" id="langDropdownMenu">
                <button class="lang-option" data-lang="ku"><span class="lang-flag"><img src="images/flag-kurdistan.svg" alt="" class="lang-flag-img" width="20" height="14"></span><span class="lang-name">کوردی</span></button>
                <button class="lang-option" data-lang="ar"><span class="lang-flag">🇮🇶</span><span class="lang-name">العربية</span></button>
                <button class="lang-option" data-lang="en"><span class="lang-flag">🇬🇧</span><span class="lang-name">English</span></button>
            </div>
        </div>
        <div class="fab-wrap theme-dropdown" id="themeDropdown">
            <button class="menu-fab" id="themeDropdownBtn" aria-label="Choose theme">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="8" r="1.5" fill="currentColor" stroke="none"/>
                    <circle cx="8.5" cy="14" r="1.5" fill="currentColor" stroke="none"/>
                    <circle cx="15.5" cy="14" r="1.5" fill="currentColor" stroke="none"/>
                </svg>
            </button>
            <div class="theme-dropdown-menu fab-theme-menu" id="themeDropdownMenu">
                <button type="button" class="theme-option active" data-theme="light">
                    <span class="theme-swatch theme-swatch-light"></span>
                    <span class="theme-name" data-i18n="themeWhite">White</span>
                </button>
                <button type="button" class="theme-option" data-theme="cream">
                    <span class="theme-swatch theme-swatch-cream"></span>
                    <span class="theme-name" data-i18n="themeCream">Cream</span>
                </button>
                <button type="button" class="theme-option" data-theme="coffee">
                    <span class="theme-swatch theme-swatch-coffee"></span>
                    <span class="theme-name" data-i18n="themeCoffee">Coffee</span>
                </button>
                <button type="button" class="theme-option" data-theme="gold">
                    <span class="theme-swatch theme-swatch-gold"></span>
                    <span class="theme-name" data-i18n="themeGold">Gold</span>
                </button>
                <button type="button" class="theme-option" data-theme="mocha">
                    <span class="theme-swatch theme-swatch-mocha"></span>
                    <span class="theme-name" data-i18n="themeMocha">Mocha</span>
                </button>
                <button type="button" class="theme-option" data-theme="dark">
                    <span class="theme-swatch theme-swatch-dark"></span>
                    <span class="theme-name" data-i18n="themeDark">Dark</span>
                </button>
            </div>
        </div>
        <button class="menu-fab menu-fab-cart" id="cartBtn" aria-label="View Cart">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-badge" id="cartBadge">0</span>
        </button>
        <button class="menu-fab menu-fab-info" id="cafeInfoBtn" type="button" aria-label="Cafe info">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 11v5"/>
                <circle cx="12" cy="8" r="1" fill="currentColor" stroke="none"/>
            </svg>
        </button>
    </div>

    <div class="menu-sheet">
        <div class="category-bar" id="categoryBar">
            <div class="category-scroll" id="categoryScroll"></div>
        </div>

        <div class="menu-section-head">
            <h2 class="active-category-title" id="activeCategoryTitle" data-i18n="menuTitle">مێنوو</h2>
            <span class="section-accent" aria-hidden="true"></span>
        </div>

        <main class="menu-layout">
            <div class="menu-grid" id="menuGrid">
                <div class="loading-menu" data-i18n="loadingMenu">Loading menu...</div>
            </div>
        </main>
    </div>

    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-backdrop" id="detailBackdrop"></div>
        <div class="detail-panel" id="detailPanel">
            <button class="detail-close" id="detailClose" aria-label="Close">✕</button>
            <div class="detail-media" id="detailMedia">
                <img id="detailImage" src="" alt="">
                <button class="video-play-btn" id="videoPlayBtn" aria-label="Play video">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
            </div>
            <div class="detail-content">
                <span class="detail-category" id="detailCategory"></span>
                <h2 class="detail-title" id="detailTitle"></h2>
                <p class="detail-desc" id="detailDesc"></p>
                <div class="detail-footer">
                    <div>
                        <span class="detail-price" id="detailPrice"></span>
                        <span class="detail-price-currency">IQD</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="video-overlay" id="videoOverlay">
        <div class="video-container" id="videoContainer">
            <button class="video-close" id="videoClose" aria-label="Close video">✕</button>
            <video id="detailVideo" controls></video>
        </div>
    </div>

    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-panel">
            <div class="cart-header">
                <h2 class="cart-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span data-i18n="cart">سەبەتە</span>
                </h2>
                <button class="cart-close" id="cartClose">✕</button>
            </div>
            <div class="cart-items" id="cartItems">
                <div class="cart-empty" id="cartEmpty">
                    <div class="cart-empty-icon">🛒</div>
                    <p data-i18n="cartEmpty">سەبەتە بەتاڵە</p>
                </div>
            </div>
            <div class="cart-footer">
                <div class="cart-customer">
                    <input type="text" id="customerName" class="cart-input" placeholder="ناوی بەڕێزتان؟" autocomplete="name">
                    <input type="text" id="customerPlace" class="cart-input" placeholder="شوێنی بەڕێزتان؟" autocomplete="street-address">
                    <p class="cart-form-warning hidden" id="cartFormWarning" role="alert" aria-live="polite"></p>
                </div>
                <div class="cart-total">
                    <span data-i18n="cartTotal">کۆی گشتی</span>
                    <span class="cart-total-value" id="cartTotal">0 IQD</span>
                </div>
                <div class="cart-actions">
                    <button class="cart-clear" id="cartClear" data-i18n="remove">لابردن</button>
                    <button class="cart-whatsapp" id="cartWhatsapp">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                        <span data-i18n="sendWhatsApp">ناردن بە واتساپ</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="cafe-info-overlay" id="cafeInfoOverlay" aria-hidden="true">
        <div class="cafe-info-backdrop"></div>
        <div class="cafe-info-panel" role="dialog" aria-labelledby="cafeInfoTitle">
            <button class="cafe-info-close" id="cafeInfoClose" type="button" aria-label="Close">✕</button>

            <div class="cafe-info-head">
                <div class="cafe-info-logo-wrap">
                    <img src="images/ali-cafe-logo-circular.png" alt="" class="cafe-info-logo" onerror="this.style.display='none'">
                </div>
                <h2 class="cafe-info-title" id="cafeInfoTitle">عەلی کافێ</h2>
                <div class="cafe-status-badge is-open" id="cafeStatusBadge">
                    <span class="cafe-status-dot" aria-hidden="true"></span>
                    <span data-cafe-status-text data-i18n="cafeOpen">ئێستا کراوەیە</span>
                </div>
            </div>

            <section class="cafe-info-block">
                <h3 class="cafe-info-block-title" data-i18n="cafeContact">پەیوەندی</h3>
                <div class="cafe-info-actions">
                    <button type="button" class="cafe-info-action" id="cafeCallBtn">
                        <span class="cafe-info-action-icon"><i class="fa-solid fa-phone"></i></span>
                        <span data-i18n="cafeCall">پەیوەندی</span>
                    </button>
                    <button type="button" class="cafe-info-action" id="cafeShareBtn">
                        <span class="cafe-info-action-icon"><i class="fa-solid fa-share-nodes"></i></span>
                        <span data-i18n="cafeShare">هاوبەشکردن</span>
                    </button>
                    <button type="button" class="cafe-info-action" id="cafeLocationBtn">
                        <span class="cafe-info-action-icon"><i class="fa-solid fa-location-dot"></i></span>
                        <span data-i18n="cafeLocation">شوێن</span>
                    </button>
                </div>
                <a class="cafe-info-address" id="cafeAddressLink" href="#" target="_blank" rel="noopener">
                    <i class="fa-solid fa-map-pin"></i>
                    <span id="cafeAddressText">بەحرکە-مجەمع</span>
                </a>
                <p class="cafe-info-phone" id="cafePhoneDisplay" dir="ltr"></p>
            </section>

            <section class="cafe-info-block">
                <h3 class="cafe-info-block-title" data-i18n="cafeHours">کاتی کردنەوە</h3>
                <div class="cafe-hours-row">
                    <span class="cafe-hours-icon"><i class="fa-regular fa-clock"></i></span>
                    <span id="cafeHoursText" data-i18n="cafeHoursValue">ڕۆژانە: ٢:٠٠ دوای نیوەڕۆ — ٢:٠٠ بەیانی</span>
                </div>
            </section>

            <section class="cafe-info-block cafe-info-block--install">
                <button type="button" class="cafe-info-install-link" id="cafeInstallHelpBtn">
                    <span class="cafe-info-install-icon"><i class="fa-solid fa-mobile-screen-button"></i></span>
                    <span data-i18n-install="installShowHelp">زیادکردن بۆ سکرینە سەرەکی</span>
                    <i class="fa-solid fa-chevron-left cafe-info-install-arrow" aria-hidden="true"></i>
                </button>
            </section>

            <section class="cafe-info-block cafe-info-block--social">
                <h3 class="cafe-info-block-title" data-i18n="cafeFollowUs">فۆڵۆومان بکەن</h3>
                <div class="cafe-social-row">
                    <a class="cafe-social-btn" id="cafeInstagramBtn" href="#" target="_blank" rel="noopener" aria-label="Instagram">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a class="cafe-social-btn cafe-social-btn--whatsapp" id="cafeWhatsappBtn" href="#" target="_blank" rel="noopener" aria-label="WhatsApp">
                        <i class="fa-brands fa-whatsapp"></i>
                    </a>
                </div>
            </section>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase.js?v=24"></script>
    <script src="js/app.js?v=70"></script>
    <script>
        (function () {
            var heroLogo = document.querySelector('.menu-hero-logo');
            setupLogoClickActions(heroLogo, function () {
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>
