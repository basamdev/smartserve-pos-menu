<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Coffee - Admin Login</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/ali-cafe-app-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/AppIcons/app-icon-180x180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="images/AppIcons/app-icon-167x167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="images/AppIcons/app-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="images/AppIcons/app-icon-120x120.png">
    <link rel="apple-touch-icon" href="images/AppIcons/app-icon-1024x1024.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ali Coffee">
    <meta name="theme-color" content="#D4AF37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
                <div id="loginError" class="error-message"></div>
            </form>
        </div>
    </div>
    
    <!-- Firebase SDKs - Load these BEFORE firebase.js -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <!-- Local Firebase Config -->
    <script src="js/firebase.js"></script>
    
    <!-- App.js for theme handling -->
    <script src="js/app.js"></script>
    
    <!-- Login Script -->
    <script src="js/login.js"></script>
</body>
</html>
