<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Test</title>
    <style>
        html, body { margin: 0; height: 100%; background: #222; color: #fff; font-family: sans-serif; }
        video { width: 100vw; height: 70vh; object-fit: cover; background: #000; display: block; }
        #log { padding: 12px; font-size: 14px; white-space: pre-wrap; }
        .ok { color: #4ade80; } .err { color: #f87171; }
        button { padding: 10px 18px; margin: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <video id="v" autoplay muted loop playsinline controls>
        <source src="images/menu-bg.mp4" type="video/mp4">
    </video>
    <button id="play">Press to Play (if autoplay blocked)</button>
    <div id="log">Loading…</div>

    <script>
        var v = document.getElementById('v');
        var log = document.getElementById('log');
        function add(msg, cls) {
            var line = document.createElement('div');
            if (cls) line.className = cls;
            line.textContent = '• ' + msg;
            log.appendChild(line);
        }
        log.textContent = '';
        add('User agent: ' + navigator.userAgent);
        add('canPlayType(video/mp4; codecs="avc1.640020"): "' + v.canPlayType('video/mp4; codecs="avc1.640020"') + '"');
        add('Service workers controlling this page: ' + (navigator.serviceWorker && navigator.serviceWorker.controller ? 'YES (could interfere)' : 'no'));

        v.addEventListener('loadedmetadata', function () {
            add('loadedmetadata OK — dimensions ' + v.videoWidth + 'x' + v.videoHeight, 'ok');
        });
        v.addEventListener('canplay', function () { add('canplay OK — file is decodable', 'ok'); });
        v.addEventListener('playing', function () { add('PLAYING — video is working', 'ok'); });
        v.addEventListener('error', function () {
            var e = v.error;
            add('ERROR code ' + (e ? e.code : '?') + ' — ' + (e ? e.message : 'unknown'), 'err');
            if (e && e.code === 4) add('Code 4 = source not found OR codec not supported by this browser.', 'err');
        });
        v.addEventListener('stalled', function () { add('stalled (network)', 'err'); });

        document.getElementById('play').addEventListener('click', function () {
            v.muted = true;
            v.play().then(function () { add('Manual play() succeeded', 'ok'); })
                    .catch(function (err) { add('Manual play() failed: ' + err, 'err'); });
        });

        v.play().catch(function (err) { add('Autoplay blocked: ' + err + ' — click the button.', 'err'); });
    </script>
</body>
</html>
