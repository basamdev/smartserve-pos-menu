<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ali Coffee - Admin Panel</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <meta name="application-name" content="Ali Coffee">
    <meta name="msapplication-TileColor" content="#5C4033">
    <meta name="msapplication-TileImage" content="assets/icon-512.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ali Coffee">
    <meta name="theme-color" content="#3B82F6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css?v=23">
    <script>
        (function () {
            try {
                var a = localStorage.getItem('adminAccent') || 'sapphire';
                document.documentElement.setAttribute('data-accent', a);
            } catch (e) {
                document.documentElement.setAttribute('data-accent', 'sapphire');
            }
        })();
    </script>
</head>
<body class="admin-page">
    <div class="admin-container admin-layout">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <img src="assets/logo.png?v=80" alt="Ali Coffee" class="sidebar-brand-icon" onclick="window.location.href='menu.html'" onerror="fallbackLogo(this)">
                    <span class="sidebar-brand-text">Ali Coffee</span>
                </div>
                <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">✕</button>
            </div>
            <div class="sidebar-nav">
                <button class="nav-item admin-nav-btn active" data-section="dashboard">
                    <span class="nav-item-icon">📊</span><span data-i18n="dashboard">Dashboard</span>
                </button>
                <button class="nav-item admin-nav-btn" data-section="items">
                    <span class="nav-item-icon">🍽️</span><span data-i18n="manageItems">Items</span>
                </button>
                <button class="nav-item admin-nav-btn" data-section="categories">
                    <span class="nav-item-icon">📁</span><span data-i18n="manageCategories">Categories</span>
                </button>
                <button class="nav-item admin-nav-btn" data-section="cashier">
                    <span class="nav-item-icon">🛒</span><span data-i18n="cashier">Cashier</span>
                </button>
                <button class="nav-item admin-nav-btn" data-section="expenses">
                    <span class="nav-item-icon">📉</span><span data-i18n="expenses">خەرجیەکان</span>
                </button>
                <button class="nav-item admin-nav-btn" data-section="settings">
                    <span class="nav-item-icon">⚙️</span><span data-i18n="settings">Settings</span>
                </button>
                <button class="nav-item admin-nav-btn nav-item--logout" data-section="logout">
                    <span class="nav-item-icon">🚪</span><span data-i18n="logout">Logout</span>
                </button>
            </div>
        </div>
        <div class="admin-main">
            <div class="admin-header">
                <div class="admin-header-left">
                    <button class="sidebar-hamburger" id="sidebarHamburger" aria-label="Open menu">
                        <span></span><span></span><span></span>
                    </button>
                    <h1 class="admin-title">Dashboard</h1>
                </div>
                <div class="admin-header-actions">
                    <div class="admin-lang-switcher">
                        <button class="admin-lang-btn" data-lang="ku">KU</button>
                        <button class="admin-lang-btn" data-lang="ar">AR</button>
                        <button class="admin-lang-btn active" data-lang="en">EN</button>
                    </div>
                    <button class="admin-theme-toggle" id="adminThemeToggle">🌙</button>
                </div>
            </div>
            <div id="adminContent"></div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase.js?v=26"></script>
    <script src="js/app.js?v=71"></script>
    <script src="js/admin.js?v=49"></script>
    <script>
        function fallbackLogo(img) {
            if (!img.dataset.retry) {
                img.dataset.retry = '1';
                img.src = 'assets/logo.png?v=80';
                return;
            }
            if (!img.dataset.retry2) {
                img.dataset.retry2 = '1';
                img.src = 'images/ali-cafe-logo-circular.png?v=80';
                return;
            }
            img.onerror = null;
            img.style.display = 'none';
            if (!img.dataset.fallback) {
                img.dataset.fallback = 'true';
                var wrap = img.closest('.sidebar-brand') || img.parentElement;
                if (wrap) {
                    var span = document.createElement('span');
                    span.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;font-weight:800;font-size:1.1rem;font-family:var(--font-body);flex-shrink:0;border:2px solid rgba(59,130,246,0.35);box-shadow:0 2px 12px rgba(59,130,246,0.25);';
                    span.textContent = 'AC';
                    wrap.insertBefore(span, wrap.firstChild);
                }
            }
        }
    </script>
</body>
</html>
